<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5521C6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0F0B1A" stroke="url(#bgGradient)" stroke-width="2.5"/>

  <!-- "S" letter stylized as a musical wave -->
  <path d="M38 16 C44 16, 46 20, 42 23 C38 26, 22 26, 22 30 C22 34, 26 38, 38 38 C44 38, 46 42, 42 45 C38 48, 22 48, 22 48"
        stroke="url(#bgGradient)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Musical note accent -->
  <circle cx="46" cy="20" r="3.5" fill="url(#noteGradient)"/>
  <rect x="49" y="10" width="2" height="12" rx="1" fill="url(#noteGradient)"/>
  <path d="M49 10 Q54 9, 54 14" stroke="url(#noteGradient)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Small cross accent -->
  <g fill="#EC4899" opacity="0.8">
    <rect x="13" y="13" width="2" height="8" rx="1"/>
    <rect x="11" y="16" width="6" height="2" rx="1"/>
  </g>
</svg>
