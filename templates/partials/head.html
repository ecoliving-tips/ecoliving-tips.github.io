    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" id="og-title" content="{{OG_TITLE}}">

    <meta property="og:locale" content="en_IN">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" id="twitter-title" content="{{TWITTER_TITLE}}">
    <meta name="twitter:description" id="twitter-description" content="{{TWITTER_DESCRIPTION}}">
    <meta name="twitter:image" content="https://ecoliving-tips.github.io/assets/og-image.png">

    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

        as="style" onload="this.onload=null;this.rel='stylesheet'">

            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

    <link rel="manifest" href="/manifest.json">

    <meta name="google-adsense-account" content="ca-pub-7438590583270235">
