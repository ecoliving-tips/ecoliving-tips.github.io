<!DOCTYPE html>
<html lang="en-IN">

<head>
{{HEAD}}

    <!-- Structured Data -->
    <script type="application/ld+json">
    {{STRUCTURED_DATA}}
    </script>
</head>

<body>
{{HEADER}}

    <main>
        <section class="songs-header">
            <div class="container">
                <h2>{{CATEGORY_NAME}} <span data-i18n="song_chords_suffix">Song Chords</span></h2>
                <p data-i18n="category_desc">Browse chord charts for Malayalam Christian songs. Free keyboard and guitar chords with video tutorials.</p>
            </div>
        </section>

        <section class="songs-section">
            <div class="container">
                <div class="songs-grid">
                    {{SONG_CARDS}}
                </div>
            </div>
        </section>

        <section class="category-links">
            <div class="container">
                <h3 data-i18n="browse_more_categories">Browse More Categories</h3>
                <div class="category-link-list">
                    {{OTHER_CATEGORIES}}
                </div>
            </div>
        </section>

{{DONATE}}
    </main>

{{FOOTER}}

    <script src="/js/main.js"></script>
    <script src="/js/i18n.js" defer></script>

</html>
